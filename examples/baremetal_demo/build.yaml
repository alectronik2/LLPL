# Includes two small files loaded as multiboot2 modules (grub.cfg's
# `module2` directive) purely to give tmpfs.llpl something real to
# expose; their exact content is asserted by TmpFS.selftest().
package:
  output: kernel.iso
  actions:
    - mkdir: isodir/boot/grub
    - copy: {from: build/kernel.bin, to: isodir/boot/kernel.bin}
    - copy: {from: build/userapp.elf, to: isodir/boot/userapp.elf}
    - copy: {from: build/llpl_userapp.elf, to: isodir/boot/llpl_userapp.elf}
    - copy: {from: build/libsys.so, to: isodir/boot/libsys.so}
    - copy: {from: build/dyn_userapp.elf, to: isodir/boot/dyn_userapp.elf}
    - copy: {from: build/memtest.elf, to: isodir/boot/memtest.elf}
    - copy: {from: build/cat.elf, to: isodir/boot/cat.elf}
    - copy: {from: build/spawnwait.elf, to: isodir/boot/spawnwait.elf}
    - copy: {from: build/execchain.elf, to: isodir/boot/execchain.elf}
    - copy: {from: build/echoserver.elf, to: isodir/boot/echoserver.elf}
    - copy: {from: build/ipcdemo.elf, to: isodir/boot/ipcdemo.elf}
    - copy: {from: build/echod.elf, to: isodir/boot/echod.elf}
    - copy: {from: build/echoclient.elf, to: isodir/boot/echoclient.elf}
    - copy: {from: build/shmserver.elf, to: isodir/boot/shmserver.elf}
    - copy: {from: build/shmclient.elf, to: isodir/boot/shmclient.elf}
    - copy: {from: build/atad.elf, to: isodir/boot/atad.elf}
    - copy: {from: build/netd.elf, to: isodir/boot/netd.elf}
    - copy: {from: build/ping.elf, to: isodir/boot/ping.elf}
    - copy: {from: build/traceroute.elf, to: isodir/boot/traceroute.elf}
    - copy: {from: build/pingview.elf, to: isodir/boot/pingview.elf}
    - copy: {from: build/tetris.elf, to: isodir/boot/tetris.elf}
    - copy: {from: build/wm.elf, to: isodir/boot/wm.elf}
    - copy: {from: build/winball1.elf, to: isodir/boot/winball1.elf}
    - copy: {from: build/winball2.elf, to: isodir/boot/winball2.elf}
    - copy: {from: build/filebrowser.elf, to: isodir/boot/filebrowser.elf}
    - copy: {from: build/editor.elf, to: isodir/boot/editor.elf}
    - copy: {from: build/terminal.elf, to: isodir/boot/terminal.elf}
    - copy: {from: build/ui_demo.elf, to: isodir/boot/ui_demo.elf}
    - write:
        to: isodir/boot/hello.txt
        content: "Hello from a GRUB module!"
    - write:
        to: isodir/boot/readme.txt
        content: "This file was never written to the VFS disk - TmpFS reads it directly out of the memory GRUB already loaded it into."
    - write:
        to: isodir/boot/grub/grub.cfg
        content: |
          set timeout=0
          set default=0
          menuentry "LLPL Bare-Metal Demo" {
              multiboot2 /boot/kernel.bin
              module2 /boot/hello.txt hello.txt
              module2 /boot/readme.txt readme.txt
              module2 /boot/userapp.elf userapp.elf
              module2 /boot/llpl_userapp.elf llpl_userapp.elf
              module2 /boot/libsys.so libsys.so
              module2 /boot/dyn_userapp.elf dyn_userapp.elf
              module2 /boot/memtest.elf memtest.elf
              module2 /boot/cat.elf cat.elf
              module2 /boot/spawnwait.elf spawnwait.elf
              module2 /boot/execchain.elf execchain.elf
              module2 /boot/echoserver.elf echoserver.elf
              module2 /boot/ipcdemo.elf ipcdemo.elf
              module2 /boot/echod.elf echod.elf
              module2 /boot/echoclient.elf echoclient.elf
              module2 /boot/shmserver.elf shmserver.elf
              module2 /boot/shmclient.elf shmclient.elf
              module2 /boot/atad.elf atad.elf
              module2 /boot/netd.elf netd.elf
              module2 /boot/ping.elf ping.elf
              module2 /boot/traceroute.elf traceroute.elf
              module2 /boot/pingview.elf pingview.elf
              module2 /boot/tetris.elf tetris.elf
              module2 /boot/wm.elf wm.elf
              module2 /boot/winball1.elf winball1.elf
              module2 /boot/winball2.elf winball2.elf
              module2 /boot/filebrowser.elf filebrowser.elf
              module2 /boot/editor.elf editor.elf
              module2 /boot/terminal.elf terminal.elf
              module2 /boot/ui_demo.elf ui_demo.elf
          }
    - run: "grub-mkrescue -o kernel.iso isodir"
      allow_failure: true

# The VFS's (vfs.llpl) backing store - built only if missing, so it
# persists across ordinary builds the same way real disk state should
# (only `clean` wipes it). Must match vfs.llpl's DISK_SECTORS constant
# (64MB / 512-byte sectors - bumped from 16MB alongside real indirect-
# block support, so files no longer capped at 32KB actually have room to
# grow into on disk too).
persistent_files:
  - path: disk.img
    create: "dd if=/dev/zero of=disk.img bs=1M count=64"

# QEMU assigns the extra `-drive ...,if=ide` (with no explicit index) as
# the primary IDE master alongside `-cdrom` - verified, not merely
# assumed, but still just "this is what QEMU happens to do today", the
# same "trust the target" spirit as the rest of this demo's hardware
# handling (see ata.llpl).
run:
  args: ["-cdrom", "kernel.iso", "-drive", "file=disk.img,format=raw,if=ide", "-serial", "stdio", "-m", "256"]
