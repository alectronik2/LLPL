# Build config for the GRUB/Multiboot2 bare-metal demo - replaces the old
# Makefile. Run with ../../tools/llplbuild/llplbuild (build|run|clean|configs)
# from within this directory. See tools/llplbuild/README.md for the tool
# itself, and the "test-persistence.sh" script alongside this file for the
# multi-boot VFS-persistence integration test (kept as a standalone script,
# not part of this pipeline - see that script's own header comment).

project: llpl-baremetal-demo
entry: kernel.llpl
llpl_compiler: ../../llpl

toolchain:
  nasm: nasm
  cc: gcc
  ld: ld
  qemu: qemu-system-x86_64

common_cflags:
  - -m64
  - -ffreestanding
  - -nostdlib
  - -nostdinc
  - -fno-builtin
  - -fno-stack-protector
  - -fno-omit-frame-pointer
  - -fno-optimize-sibling-calls
  - -Wall
  - -Wextra
  - -I.
  - -mcmodel=kernel
  - -fno-pie
  - -mno-red-zone
  - -mno-sse
  - -mno-sse2
  - -mno-mmx
  - -mno-80387

default_config: final
configurations:
  debug:
    cflags: [-O0, -g]
  final:
    cflags: [-O2]

asm_sources:
  - src: boot64.asm
    output: build/boot.o

c_sources:
  - path: kernel.c
    output: build/kernel.o
    include_dirs: [../../runtime]
  - path: ../../runtime/runtime.c
    output: build/runtime.o
    include_dirs: [../../runtime]

link:
  output: build/kernel.bin
  script: linker64.ld
  ldflags: [-m, elf_x86_64, -nostdlib]
  objects: [build/boot.o, build/kernel.o, build/runtime.o]

extra_links:
  - name: userapp
    asm_sources:
      - src: userapp/tests/userapp.asm
        output: build/userapp.o
    link:
      output: build/userapp.elf
      script: userapp/linker.ld
      ldflags: [-m, elf_x86_64, -nostdlib, -static]
      objects: [build/userapp.o]
  - name: llpl_userapp
    llpl_sources:
      - src: userapp/tests/llpl_userapp.llpl
        c_output: build/llpl_userapp.c
        output: build/llpl_userapp.o
        include_dirs: [., ../../runtime]
        cflags: [-mcmodel=large, -ffunction-sections, -fdata-sections]
    link:
      output: build/llpl_userapp.elf
      script: userapp/linker.ld
      ldflags: [-m, elf_x86_64, -nostdlib, -static, --gc-sections]
      objects: [build/llpl_userapp.o]
  - name: libsys
    llpl_sources:
      - src: libsys/libsys.llpl
        c_output: build/libsys.c
        output: build/libsys.o
        include_dirs: [., ../../runtime]
        cflags: [-fPIC, -fvisibility=default, -mcmodel=large, -ffunction-sections, -fdata-sections]
    c_sources:
      # A handful of runtime.c's helpers reimplemented standalone here
      # (see runtime_shim.c's own doc comment) rather than linking the
      # whole of runtime.c in: libsys.llpl's own generated code (via
      # prelude.llpl's always-compiled-in String/class boilerplate)
      # already references most of runtime.c's surface internally, which
      # makes --gc-sections unable to strip any of it once the real
      # runtime.c is linked in at all - pulling in the whole file to fix
      # one missing symbol (llpl_strcmp, needed because some consumer's
      # `char* == null` comparison happens to lower to it - see wm.llpl,
      # where the optimizer didn't manage to fold that away the way it
      # apparently does for tetris.elf/atad.elf's own such comparisons)
      # made libsys.so balloon past the VFS's 32KB max file size (see
      # vfs.llpl's MAX_DIRECT_BLOCKS).
      - path: libsys/runtime_shim.c
        output: build/runtime_shim.o
        cflags: [-fPIC, -mcmodel=large]
    link:
      output: build/libsys.so
      script: libsys/linker.ld
      ldflags: [-m, elf_x86_64, -nostdlib, -shared, -soname, libsys.so, --hash-style=sysv, --gc-sections, --version-script, libsys/exports.map]
      objects: [build/libsys.o, build/runtime_shim.o]
  - name: dyn_userapp
    llpl_sources:
      - src: userapp/tests/dyn_userapp.llpl
        c_output: build/dyn_userapp.c
        output: build/dyn_userapp.o
        include_dirs: [., ../../runtime]
        cflags: [-fPIC, -fvisibility=hidden, -mcmodel=large, -ffunction-sections, -fdata-sections]
    link:
      output: build/dyn_userapp.elf
      script: userapp/dyn_linker.ld
      ldflags: [-m, elf_x86_64, -nostdlib, -shared, -e, _start, --hash-style=sysv, --gc-sections]
      objects: [build/dyn_userapp.o, build/libsys.so]
  - name: memtest
